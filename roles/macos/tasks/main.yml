---
- name: Locate Homebrew
  ansible.builtin.command: /bin/zsh -lc 'command -v brew'
  register: macos_brew_path
  changed_when: false
  check_mode: false

- name: Check Homebrew formulae
  ansible.builtin.command: "{{ macos_brew_path.stdout }} list --formula {{ item }}"
  loop:
    - neovim
    - pyenv
    - ripgrep
  register: macos_homebrew_formulae
  changed_when: false
  failed_when: macos_homebrew_formulae.rc not in [0, 1]
  check_mode: false

- name: Install Homebrew formulae
  ansible.builtin.command: "{{ macos_brew_path.stdout }} install {{ item }}"
  loop: "{{ macos_homebrew_formulae.results | selectattr('rc', 'equalto', 1) | map(attribute='item') | list }}"

- name: Check Homebrew casks
  ansible.builtin.command: "{{ macos_brew_path.stdout }} list --cask {{ item }}"
  loop:
    - font-jetbrains-maple-mono-nf
    - hammerspoon
    - zed
  register: macos_homebrew_casks
  changed_when: false
  failed_when: macos_homebrew_casks.rc not in [0, 1]
  check_mode: false

- name: Install Homebrew casks
  ansible.builtin.command: "{{ macos_brew_path.stdout }} install --cask --adopt {{ item }}"
  loop: "{{ macos_homebrew_casks.results | selectattr('rc', 'equalto', 1) | map(attribute='item') | list }}"

- name: Check GUI application PATH
  ansible.builtin.command:
    argv:
      - launchctl
      - getenv
      - PATH
  register: macos_gui_path
  changed_when: false
  failed_when: false
  check_mode: false

- name: Configure GUI applications to use current PATH
  when:
    - ansible_facts.env.PATH is defined
    - ansible_facts.env.PATH | length > 0
    - macos_gui_path.stdout != ansible_facts.env.PATH
  block:
    - name: Configure launchd user PATH
      ansible.builtin.command:
        argv:
          - launchctl
          - config
          - user
          - path
          - "{{ ansible_facts.env.PATH }}"
      become: true

  rescue:
    - name: Report missing sudo password for GUI PATH configuration
      ansible.builtin.debug:
        msg: "Skipping GUI PATH configuration because launchctl config user path requires sudo. Re-run ansible-playbook with --ask-become-pass or -K to apply it."
      when: 'ansible_failed_result.msg is search("sudo: a password is required")'

    - name: Fail unexpected GUI PATH configuration errors
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg }}"
      when: 'ansible_failed_result.msg is not search("sudo: a password is required")'

- name: Check natural scrolling preference
  ansible.builtin.command:
    argv:
      - defaults
      - read
      - NSGlobalDomain
      - com.apple.swipescrolldirection
  register: macos_natural_scrolling
  changed_when: false
  failed_when: macos_natural_scrolling.rc not in [0, 1]
  check_mode: false

- name: Ensure natural scrolling is disabled globally
  ansible.builtin.command:
    argv:
      - defaults
      - write
      - NSGlobalDomain
      - com.apple.swipescrolldirection
      - -bool
      - "false"
  when: macos_natural_scrolling.stdout != "0"

- name: Check Safari custom keyboard shortcuts
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - Print :NSUserKeyEquivalents
      - "{{ ansible_facts.user_dir }}/Library/Containers/com.apple.Safari/Data/Library/Preferences/com.apple.Safari.plist"
  register: macos_safari_keyboard_shortcuts
  changed_when: false
  failed_when: macos_safari_keyboard_shortcuts.rc not in [0, 1]
  check_mode: false

- name: Ensure Safari custom keyboard shortcuts dictionary exists
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - Add :NSUserKeyEquivalents dict
      - "{{ ansible_facts.user_dir }}/Library/Containers/com.apple.Safari/Data/Library/Preferences/com.apple.Safari.plist"
  when: macos_safari_keyboard_shortcuts.rc == 1

- name: Check Safari quit keyboard shortcut
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - Print :NSUserKeyEquivalents:Quit\ Safari
      - "{{ ansible_facts.user_dir }}/Library/Containers/com.apple.Safari/Data/Library/Preferences/com.apple.Safari.plist"
  register: macos_safari_quit_keyboard_shortcut
  changed_when: false
  failed_when: macos_safari_quit_keyboard_shortcut.rc not in [0, 1]
  check_mode: false

- name: Add Safari quit keyboard shortcut
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - Add :NSUserKeyEquivalents:Quit\ Safari string @$q
      - "{{ ansible_facts.user_dir }}/Library/Containers/com.apple.Safari/Data/Library/Preferences/com.apple.Safari.plist"
  when: macos_safari_quit_keyboard_shortcut.rc == 1

- name: Update Safari quit keyboard shortcut
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - Set :NSUserKeyEquivalents:Quit\ Safari @$q
      - "{{ ansible_facts.user_dir }}/Library/Containers/com.apple.Safari/Data/Library/Preferences/com.apple.Safari.plist"
  when:
    - macos_safari_quit_keyboard_shortcut.rc == 0
    - macos_safari_quit_keyboard_shortcut.stdout != "@$q"

- name: Ensure Hammerspoon config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.hammerspoon"
    state: directory
    mode: "0755"

- name: Install Hammerspoon init.lua
  ansible.builtin.copy:
    src: hammerspoon/init.lua
    dest: "{{ ansible_facts.user_dir }}/.hammerspoon/init.lua"
    mode: "0644"
