---
dotfiles_repo_url: https://github.com/quark-zju/dotfiles.git
dotfiles_repo_dest: "{{ ansible_facts.user_dir }}/src/dotfiles"

dotfiles_gitconfig_local_path: "{{ ansible_facts.user_dir }}/.gitconfig.local"
dotfiles_cargo_config_dir: "{{ ansible_facts.user_dir }}/.cargo"
dotfiles_cargo_config_path: "{{ dotfiles_cargo_config_dir }}/config.toml"
dotfiles_cargo_config_source_path: "{{ dotfiles_repo_dest }}/.cargo/config.toml"
dotfiles_codex_config_dir: "{{ ansible_facts.user_dir }}/.codex"
dotfiles_codex_config_path: "{{ dotfiles_codex_config_dir }}/config.toml"
dotfiles_codex_config_analytics_enabled: false
dotfiles_agents_source: "{{ dotfiles_repo_dest }}/.config/opencode/AGENTS.md"

dotfiles_link_parent_dirs:
  - "{{ ansible_facts.user_dir }}/.config"

dotfiles_links:
  - dest: "{{ ansible_facts.user_dir }}/.zshrc"
    src: src/dotfiles/.zshrc
  - dest: "{{ ansible_facts.user_dir }}/.config/nvim"
    src: ../src/dotfiles/.config/nvim
  - dest: "{{ ansible_facts.user_dir }}/.config/zsh"
    src: ../src/dotfiles/.config/zsh
  - dest: "{{ ansible_facts.user_dir }}/.gitconfig"
    src: src/dotfiles/.gitconfig
  - dest: "{{ ansible_facts.user_dir }}/.config/git-hooks"
    src: ../src/dotfiles/.config/git-hooks

dotfiles_opencode_config_dir: "{{ ansible_facts.user_dir }}/.config/opencode"
dotfiles_zed_config_dir: "{{ ansible_facts.user_dir }}/.config/zed"

dotfiles_opencode_links:
  - dest: "{{ dotfiles_opencode_config_dir }}/AGENTS.md"
    src: "{{ dotfiles_agents_source }}"
  - dest: "{{ dotfiles_opencode_config_dir }}/opencode.json"
    src: ../../src/dotfiles/.config/opencode/opencode.json
  - dest: "{{ dotfiles_opencode_config_dir }}/plugins"
    src: ../../src/dotfiles/.config/opencode/plugins

dotfiles_codex_agents_link:
  dest: "{{ dotfiles_codex_config_dir }}/AGENTS.md"
  src: "{{ dotfiles_agents_source }}"

dotfiles_zed_agents_link:
  dest: "{{ dotfiles_zed_config_dir }}/AGENTS.md"
  src: "{{ dotfiles_agents_source }}"
