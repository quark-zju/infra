---
- name: Check whether kimi code config directory exists
  ansible.builtin.stat:
    path: "{{ dotfiles_kimi_code_config_dir }}"
  register: dotfiles_kimi_code_config_dir_stat

- name: Link kimi code AGENTS.md to dotfiles AGENTS.md
  ansible.builtin.file:
    src: "{{ dotfiles_agents_source }}"
    dest: "{{ dotfiles_kimi_code_config_dir }}/AGENTS.md"
    state: link
    force: true
    follow: false
    owner: "{{ dotfiles_kimi_code_link_owner | default(omit) }}"
    group: "{{ dotfiles_kimi_code_link_group | default(omit) }}"
  when: dotfiles_kimi_code_config_dir_stat.stat.exists
