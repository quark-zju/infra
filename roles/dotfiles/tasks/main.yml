---
- name: Ensure source directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_repo_dest | dirname }}"
    state: directory
    mode: "0755"

- name: Check whether dotfiles repository exists
  ansible.builtin.stat:
    path: "{{ dotfiles_repo_dest }}/.git"
  register: dotfiles_repo_git_dir

- name: Read existing dotfiles repository origin URL
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ dotfiles_repo_dest }}"
      - config
      - --get
      - remote.origin.url
  register: dotfiles_repo_origin_url
  changed_when: false
  failed_when: false
  when: dotfiles_repo_git_dir.stat.exists

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: >-
      {{
        dotfiles_repo_origin_url.stdout
        if (
          dotfiles_repo_git_dir.stat.exists
          and dotfiles_repo_origin_url.stdout is defined
          and (
            dotfiles_repo_origin_url.stdout.startswith('git@')
            or dotfiles_repo_origin_url.stdout.startswith('ssh://')
          )
        )
        else dotfiles_repo_url
      }}
    dest: "{{ dotfiles_repo_dest }}"
    version: HEAD
    update: true

- name: Read dotfiles HEAD author name
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ dotfiles_repo_dest }}"
      - log
      - -1
      - --format=%an
  register: dotfiles_head_author_name
  changed_when: false

- name: Read dotfiles HEAD author email
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ dotfiles_repo_dest }}"
      - log
      - -1
      - --format=%ae
  register: dotfiles_head_author_email
  changed_when: false

- name: Install local git identity from dotfiles HEAD
  ansible.builtin.blockinfile:
    path: "{{ dotfiles_gitconfig_local_path }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED DOTFILES GIT IDENTITY"
    block: "{{ lookup('ansible.builtin.template', 'gitconfig.local.block.j2') }}"

- name: Install global gitignore entries
  ansible.builtin.blockinfile:
    path: "{{ dotfiles_gitignore_global_path }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED DOTFILES GITIGNORE"
    block: |
      .DS_Store
      target
      __pycache__
      *.swp

- name: Ensure Cargo config directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_cargo_config_dir }}"
    state: directory
    mode: "0755"

- name: Install Cargo config from dotfiles
  ansible.builtin.blockinfile:
    path: "{{ dotfiles_cargo_config_path }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED DOTFILES CARGO CONFIG"
    block: "{{ lookup('ansible.builtin.file', dotfiles_cargo_config_source_path) }}"

- name: Ensure dotfile symlink parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ dotfiles_link_parent_dirs }}"

- name: Install dotfile symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
    follow: false
  loop: "{{ dotfiles_links }}"

- name: Ensure opencode config directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_opencode_config_dir }}"
    state: directory
    mode: "0755"

- name: Install opencode config symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
    follow: false
  loop: "{{ dotfiles_opencode_links }}"

- name: Ensure Codex config directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_codex_config_dir }}"
    state: directory
    mode: "0755"

- name: Disable Codex analytics
  ansible.builtin.blockinfile:
    path: "{{ dotfiles_codex_config_path }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED CODEX ANALYTICS"
    block: |
      # https://www.reddit.com/r/codex/comments/1ucnd5y/codex_almost_made_me_worry_about_my_ssd_so_i/
      [analytics]
      enabled = {{ dotfiles_codex_config_analytics_enabled | bool | lower }}

- name: Link Codex AGENTS.md to dotfiles AGENTS.md
  ansible.builtin.file:
    src: "{{ dotfiles_codex_agents_link.src }}"
    dest: "{{ dotfiles_codex_agents_link.dest }}"
    state: link
    force: true
    follow: false

- name: Ensure Zed config directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_zed_config_dir }}"
    state: directory
    mode: "0755"

- name: Link Zed AGENTS.md to dotfiles AGENTS.md
  ansible.builtin.file:
    src: "{{ dotfiles_zed_agents_link.src }}"
    dest: "{{ dotfiles_zed_agents_link.dest }}"
    state: link
    force: true
    follow: false
