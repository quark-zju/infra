- name: Ensure base packages are installed
  ansible.builtin.apt:
    name:
      - build-essential
      - fuse3
      - gh
      - git
      - iproute2
      - npm
      - python-is-python3
      - ripgrep
      - rustup
      - zsh
    state: present
    update_cache: true

- name: Determine global npm prefix
  ansible.builtin.command:
    argv:
      - npm
      - prefix
      - -g
  register: opencode_npm_prefix
  changed_when: false

- name: Check whether opencode is already installed globally
  ansible.builtin.command:
    argv:
      - npm
      - list
      - -g
      - opencode-ai
      - --depth=0
  register: opencode_npm_list
  changed_when: false
  failed_when: false

- name: Parse installed opencode version from npm list output
  ansible.builtin.set_fact:
    opencode_installed_version: "{{ opencode_npm_list.stdout | regex_search('opencode-ai@[0-9]+\\.[0-9]+\\.[0-9]+') | default('', true) | regex_replace('^opencode-ai@', '') }}"
  when: opencode_npm_list.rc == 0

- name: Decide whether opencode upgrade is needed
  ansible.builtin.set_fact:
    opencode_upgrade_needed: "{{ (opencode_npm_list.rc != 0) or (opencode_installed_version is version(opencode_minimum_version, '<')) }}"

- name: Install or upgrade opencode globally when below minimum version
  ansible.builtin.command:
    argv:
      - npm
      - install
      - -g
      - opencode-ai
  when: opencode_upgrade_needed
  notify: Restart opencode

- name: Check whether kimi code is already installed globally
  ansible.builtin.command:
    argv:
      - npm
      - list
      - -g
      - "@moonshot-ai/kimi-code"
      - --depth=0
  register: kimi_npm_list
  changed_when: false
  failed_when: false

- name: Parse installed kimi code version from npm list output
  ansible.builtin.set_fact:
    kimi_installed_version: "{{ kimi_npm_list.stdout | regex_search('@moonshot-ai/kimi-code@[0-9]+\\.[0-9]+\\.[0-9]+') | default('', true) | regex_replace('^@moonshot-ai/kimi-code@', '') }}"
  when: kimi_npm_list.rc == 0

- name: Decide whether kimi code upgrade is needed
  ansible.builtin.set_fact:
    kimi_upgrade_needed: "{{ (kimi_npm_list.rc != 0) or (kimi_installed_version is version(kimi_minimum_version, '<')) }}"

- name: Install or upgrade kimi code globally when below minimum version
  ansible.builtin.command:
    argv:
      - npm
      - install
      - -g
      - "@moonshot-ai/kimi-code"
  when: kimi_upgrade_needed
  notify: Restart kimi

- name: Ensure opencode group exists
  ansible.builtin.group:
    name: "{{ opencode_group }}"
    system: true

- name: Ensure opencode user exists
  ansible.builtin.user:
    name: "{{ opencode_user }}"
    group: "{{ opencode_group }}"
    system: true
    create_home: true
    home: "{{ opencode_home }}"
    shell: /bin/zsh

- name: Enable linger for opencode user
  ansible.builtin.command:
    argv:
      - loginctl
      - enable-linger
      - "{{ opencode_user }}"
    creates: /var/lib/systemd/linger/{{ opencode_user }}

- name: Read opencode passwd entry
  ansible.builtin.getent:
    database: passwd
    key: "{{ opencode_user }}"

- name: Set opencode uid fact
  ansible.builtin.set_fact:
    opencode_user_uid: "{{ ansible_facts.getent_passwd[opencode_user][1] }}"

- name: Ensure opencode home exists
  ansible.builtin.file:
    path: "{{ opencode_home }}"
    state: directory
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"
    mode: "0750"

- name: Ensure opencode src directory exists
  ansible.builtin.file:
    path: "{{ opencode_src_dir }}"
    state: directory
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"
    mode: "0750"

- name: Ensure opencode .config directory exists
  ansible.builtin.file:
    path: "{{ opencode_home }}/.config"
    state: directory
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"
    mode: "0750"

- name: Check whether opencode dotfiles repo exists
  ansible.builtin.stat:
    path: "{{ item.dest }}/.git"
  loop: "{{ opencode_repositories }}"
  register: opencode_repository_git_dirs

- name: Clone opencode repositories
  ansible.builtin.git:
    repo: "{{ item.item.repo }}"
    dest: "{{ item.item.dest }}"
    version: HEAD
    update: false
  become: true
  become_user: "{{ opencode_user }}"
  loop: "{{ opencode_repository_git_dirs.results }}"
  when: not item.stat.exists

- name: Check whether stable rust toolchain is installed
  ansible.builtin.command:
    argv:
      - "{{ opencode_rustup_bin }}"
      - run
      - "{{ opencode_rustup_toolchain }}"
      - rustc
      - --version
  register: opencode_rustup_toolchain_check
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ opencode_user }}"
  environment:
    HOME: "{{ opencode_home }}"

- name: Install stable rust toolchain without docs
  ansible.builtin.command:
    argv:
      - "{{ opencode_rustup_bin }}"
      - toolchain
      - install
      - "{{ opencode_rustup_toolchain }}"
      - --profile
      - "{{ opencode_rustup_profile }}"
  become: true
  become_user: "{{ opencode_user }}"
  environment:
    HOME: "{{ opencode_home }}"
  when: opencode_rustup_toolchain_check.rc != 0

- name: Check whether leash is installed
  ansible.builtin.stat:
    path: "{{ opencode_home }}/.cargo/bin/leash"
  register: opencode_leash_bin_stat

- name: Install leash from source
  ansible.builtin.command:
    argv:
      - "{{ opencode_rustup_bin }}"
      - run
      - "{{ opencode_rustup_toolchain }}"
      - cargo
      - install
      - --path
      - .
  args:
    chdir: "{{ opencode_leash_dir }}"
  become: true
  become_user: "{{ opencode_user }}"
  environment:
    HOME: "{{ opencode_home }}"
  when: not opencode_leash_bin_stat.stat.exists

- name: Link opencode gitconfig
  ansible.builtin.file:
    src: "{{ opencode_dotfiles_dir }}/.gitconfig"
    dest: "{{ opencode_home }}/.gitconfig"
    state: link
    force: true
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"

- name: Link opencode zshrc
  ansible.builtin.file:
    src: "{{ opencode_dotfiles_dir }}/.zshrc"
    dest: "{{ opencode_home }}/.zshrc"
    state: link
    force: true
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"

- name: Link opencode zsh config
  ansible.builtin.file:
    src: "../src/dotfiles/.config/zsh"
    dest: "{{ opencode_home }}/.config/zsh"
    state: link
    force: true
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"

- name: Link opencode git hooks
  ansible.builtin.file:
    src: "../src/dotfiles/.config/git-hooks"
    dest: "{{ opencode_home }}/.config/git-hooks"
    state: link
    force: true
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"

- name: Ensure kimi code config directory exists
  ansible.builtin.file:
    path: "{{ opencode_home }}/.kimi-code"
    state: directory
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"
    mode: "0700"

- name: Install kimi code dotfiles links
  ansible.builtin.include_role:
    name: dotfiles
    tasks_from: kimi_code_agents
  vars:
    dotfiles_agents_source: "{{ opencode_dotfiles_dir }}/.config/opencode/AGENTS.md"
    dotfiles_kimi_code_config_dir: "{{ opencode_home }}/.kimi-code"
    dotfiles_kimi_code_link_owner: "{{ opencode_user }}"
    dotfiles_kimi_code_link_group: "{{ opencode_group }}"

- name: Ensure opencode config directory exists
  ansible.builtin.file:
    path: "{{ opencode_home }}/.config/opencode"
    state: directory
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"
    mode: "0750"

- name: Link opencode AGENTS.md
  ansible.builtin.file:
    src: "../../src/dotfiles/.config/opencode/AGENTS.md"
    dest: "{{ opencode_home }}/.config/opencode/AGENTS.md"
    state: link
    force: true
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"

- name: Link opencode opencode.json
  ansible.builtin.file:
    src: "../../src/dotfiles/.config/opencode/opencode.json"
    dest: "{{ opencode_home }}/.config/opencode/opencode.json"
    state: link
    force: true
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"

- name: Link opencode plugins
  ansible.builtin.file:
    src: "../../src/dotfiles/.config/opencode/plugins"
    dest: "{{ opencode_home }}/.config/opencode/plugins"
    state: link
    force: true
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"

- name: Write opencode local git config
  ansible.builtin.copy:
    dest: "{{ opencode_home }}/.gitconfig.local"
    owner: "{{ opencode_user }}"
    group: "{{ opencode_group }}"
    mode: "0640"
    content: |
      [user]
              name = Jun Wu
              email = quark@lihdd.net

- name: Ensure opencode config directory exists
  ansible.builtin.file:
    path: "{{ opencode_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Locate opencode vault variables file
  ansible.builtin.set_fact:
    opencode_vault_file: >-
      {{ lookup(
        'ansible.builtin.first_found',
        {
          'files': (
            [inventory_hostname ~ '/vault.yml']
            + (
              group_names
              | map('regex_replace', '$', '/vault.yml')
              | list
            )
          ),
          'paths': [
            inventory_dir ~ '/group_vars',
            playbook_dir ~ '/../group_vars'
          ]
        },
        errors='ignore'
      ) }}

- name: Load opencode vault variables
  ansible.builtin.include_vars:
    file: "{{ opencode_vault_file }}"
  when: opencode_vault_file | default('', true) | length > 0

- name: Require opencode server password
  ansible.builtin.assert:
    that:
      - opencode_server_password is defined
      - opencode_server_password | length > 0
    fail_msg: Define opencode_server_password, preferably in an ansible-vault file.

- name: Write opencode environment file
  ansible.builtin.copy:
    dest: "{{ opencode_env_file }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      OPENCODE_SERVER_PASSWORD={{ opencode_server_password | to_json }}
      OPENCODE_ENABLE_EXA=1
      # Prefer the persistent server token at ~/.kimi-code/server.token; it does not expire server-side.
      KIMI_CODE_ALLOWED_HOSTS={{ kimi_code_allowed_hosts | to_json }}
      KIMI_DISABLE_TELEMETRY=1
  no_log: true
  notify:
    - Restart opencode
    - Restart kimi

- name: Determine primary IPv4 address
  ansible.builtin.command:
    argv:
      - ip
      - -4
      - route
      - get
      - 1.1.1.1
  register: opencode_primary_ipv4_route
  changed_when: false

- name: Parse primary IPv4 address
  ansible.builtin.set_fact:
    opencode_primary_ipv4_addresses: >-
      {{
        opencode_primary_ipv4_route.stdout
        | regex_findall('(?:^|\\s)src\\s+([0-9]+(?:\\.[0-9]+){3})(?:\\s|$)')
      }}

- name: Require one primary IPv4 address
  ansible.builtin.assert:
    that:
      - opencode_primary_ipv4_addresses | length == 1
    fail_msg: >-
      Could not determine one primary IPv4 address from
      "ip -4 route get 1.1.1.1": {{ opencode_primary_ipv4_route.stdout }}

- name: Parse primary IPv4 octets
  ansible.builtin.set_fact:
    opencode_primary_ipv4_octets: "{{ opencode_primary_ipv4_addresses[0].split('.') }}"

- name: Require room for sibling proxy subnet
  ansible.builtin.assert:
    that:
      - opencode_primary_ipv4_octets[2] | int < 255
    fail_msg: >-
      Cannot derive the sibling proxy address from {{ opencode_primary_ipv4_addresses[0] }}:
      its third octet cannot be incremented.

- name: Derive sibling proxy address
  ansible.builtin.set_fact:
    opencode_sibling_proxy_address: >-
      {{
        opencode_primary_ipv4_octets[0]
        ~ '.' ~ opencode_primary_ipv4_octets[1]
        ~ '.' ~ ((opencode_primary_ipv4_octets[2] | int) + 1)
        ~ '.1'
      }}

- name: Install opencode systemd unit
  ansible.builtin.template:
    src: opencode.service.j2
    dest: /etc/systemd/system/{{ opencode_service_name }}.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart opencode

- name: Ensure opencode service is enabled and started
  ansible.builtin.systemd:
    name: "{{ opencode_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Install kimi systemd unit
  ansible.builtin.template:
    src: kimi.service.j2
    dest: /etc/systemd/system/{{ kimi_service_name }}.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart kimi

- name: Ensure kimi service is enabled and started
  ansible.builtin.systemd:
    name: "{{ kimi_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
