opencode_service_name: opencode
opencode_user: opencode
opencode_group: opencode
opencode_home: /home/opencode
opencode_src_dir: /home/opencode/src
opencode_dotfiles_dir: /home/opencode/src/dotfiles
opencode_repositories:
  - name: dotfiles
    repo: https://github.com/quark-zju/dotfiles
    dest: /home/opencode/src/dotfiles
  - name: leash
    repo: https://github.com/quark-zju/leash
    dest: /home/opencode/src/leash
opencode_config_dir: /etc/opencode
opencode_env_file: /etc/opencode/opencode.env
opencode_rustup_bin: /usr/bin/rustup
opencode_rustup_toolchain: stable
opencode_rustup_profile: minimal
opencode_leash_dir: /home/opencode/src/leash
opencode_leash_bin: /home/opencode/.cargo/bin/leash
opencode_web_hostname: 0.0.0.0
opencode_web_port: 4096
opencode_log_level: ERROR
opencode_restart_sec: 15s
opencode_start_limit_interval_sec: 5min
opencode_start_limit_burst: 5
opencode_memory_high: 650M
opencode_memory_max: 800M
