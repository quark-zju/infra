- name: Gather distribution fact
  ansible.builtin.setup:
    filter: ansible_distribution
    gather_subset:
      - min
  when: ansible_facts.distribution is not defined

- name: Install Debian hardening packages
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - sshguard
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts.distribution == "Debian"

- name: Enable automatic reboot after unattended upgrades on Debian
  ansible.builtin.copy:
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts.distribution == "Debian"

- name: Install risky module blacklist config
  ansible.builtin.template:
    src: blacklist.risky.conf.j2
    dest: "{{ linux_hardening_modprobe_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Apply Linux hardening sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value | string }}"
    sysctl_file: "{{ linux_hardening_sysctl_file }}"
    state: present
    sysctl_set: true
    reload: "{{ ansible_loop.last }}"
  loop:
    - name: kernel.yama.ptrace_scope
      value: 1
    # CVE-2026-23111 nf_tables use-after-free
    - name: kernel.unprivileged_userns_clone
      value: 0
  loop_control:
    extended: true
