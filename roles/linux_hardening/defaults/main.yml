linux_hardening_modprobe_path: /etc/modprobe.d/blacklist.risky.conf
linux_hardening_ptrace_scope: 1

linux_hardening_module_groups:
  - comment: "Copy Fail - CVE-2026-31431"
    details: "AF_ALG / algif_aead path, local privilege escalation"
    entries:
      - af_alg
      - algif_aead
      - algif_hash
      - algif_skcipher
      - algif_rng

  - comment: "Dirty Frag - CVE-2026-43284 / CVE-2026-43500"
    details: "IPsec ESP + RxRPC page-cache write paths"
    entries:
      - esp4
      - esp6
      - rxrpc

  - comment: "Fragnesia - CVE-2026-46300"
    details: "XFRM / ESP-in-TCP related"
    entries:
      - espintcp

  - comment: "DirtyDecrypt / DirtyCBC - CVE-2026-31635"
    details: "Reported against rxgk / RxGK path"
    entries:
      - rxgk

  - comment: "PinTheft - RDS LPE"
    entries:
      - rds
      - rds_tcp

  - comment: "uncommon network protocols"
    details: "DCCP historical LPE, CVE-2017-6074"
    entries:
      - dccp
      - dccp_ipv4
      - dccp_ipv6
      - sctp
      - rds
      - tipc

  - comment: "HDLC TTY line discipline - CVE-2017-2636"
    entries:
      - n_hdlc

  - comment: "uncommon filesystems"
    entries:
      - cramfs
      - freevxfs
      - jffs2
      - hfs
      - hfsplus

  - comment: "external buses"
    entries:
      - firewire-core
      - firewire-ohci
